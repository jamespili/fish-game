<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海跃动 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #020509; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; position: fixed; width: 100%; }
        #gc { position: relative; width: 100%; height: 100%; background: #050a12; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; pointer-events: none; z-index: 10; }
        .stat { background: rgba(0, 136, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(0, 136, 255, 0.3); border-radius: 20px; padding: 8px 20px; font-size: 12px; color: #4db8ff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat span { color: #fff; font-weight: bold; margin-left: 6px; font-size: 16px; }
        #msg { position: absolute; inset: 0; background: rgba(3,8,16,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        #msg h2 { font-size: 32px; color: #fff; margin-bottom: 15px; text-shadow: 0 0 20px #0088ff; letter-spacing: 2px; }
        #msg p { color: #7aafd4; margin-bottom: 40px; font-size: 15px; text-align: center; }
        #msg button { background: linear-gradient(135deg, #0088ff, #0044bb); color: #fff; border: none; border-radius: 35px; padding: 18px 70px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #hint { position: absolute; bottom: 50px; width: 100%; text-align: center; color: rgba(77,184,255,0.35); font-size: 13px; letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>
<div id="gc">
    <div id="ui">
        <div class="stat">DEPTH<span id="sc">0</span></div>
        <div class="stat">BEST<span id="bs">0</span></div>
    </div>
    <canvas id="cv"></canvas>
    <div id="msg">
        <h2>SHARK LOST</h2>
        <p id="mb">深海中潜伏着未知的危险...</p >
        <button onclick="restartGame()">再次挑战</button>
    </div>
    <div id="hint">长按蓄力 · 闪电出击</div>
</div>

<script>
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg');

let W, H, gameState, score = 0, best = 0, holding = false, holdStart = 0, time = 0;
let tanks = [], shark, particles = [], camX = 0, targetCamX = 0;

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playSound(type) {
    try {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'jump') {
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'hit') {
            osc.frequency.setValueAtTime(140, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    } catch(e){}
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

function makeTank(x) {
    const tankW = W * 0.22; const tankH = H * 0.12;
    const t = { x, y: H - tankH - 120, w: tankW, h: tankH, color: '#00ccff', offset: Math.random()*10 };
    t.bubbles = [];
    for(let i=0; i<3; i++) t.bubbles.push({x: Math.random()*t.w, y: Math.random()*t.h, r: 1, s: 0.3+Math.random()*0.3});
    return t;
}

function initGame() {
    score = 0; scEl.textContent = 0;
    tanks = [makeTank(W * 0.1)]; 
    for(let i=0; i<4; i++) spawnNext();
    shark = { x: tanks[0].x + tanks[0].w/2, y: tanks[0].y - 12, vx: 0, vy: 0, angle: 0, tail: 0 };
    camX = 0; targetCamX = 0;
    particles = []; gameState = 'idle';
    msg.style.display = 'none';
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    // 距离远近不一：W * 0.3 到 W * 0.7 之间大幅度随机
    const gap = W * (0.3 + Math.random() * 0.4);
    tanks.push(makeTank(last.x + last.w + gap));
}

function drawShark(x, y, ang, tail, isSwimming) {
    cx.save();
    const swimY = isSwimming ? Math.sin(time * 0.08) * 4 : 0;
    cx.translate(x, y + swimY); 
    cx.rotate(ang);
    const g = cx.createLinearGradient(-18, 0, 18, 0);
    g.addColorStop(0, '#1a75ff'); g.addColorStop(1, '#80b3ff');
    cx.fillStyle = g; cx.shadowBlur = 15; cx.shadowColor = 'rgba(0,136,255,0.5)';
    cx.beginPath(); cx.ellipse(0, 0, 20, 9, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.moveTo(-4, -7); cx.quadraticCurveTo(2, -15, 9, -5); cx.fill();
    const tw = Math.sin(tail) * 5;
    cx.beginPath(); cx.moveTo(-16, 0); cx.lineTo(-27, -8 + tw); cx.lineTo(-23, 0); cx.lineTo(-27, 8 + tw); cx.fill();
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(11, -2, 2.2, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#000'; cx.beginPath(); cx.arc(12, -2, 1, 0, Math.PI*2); cx.fill();
    cx.restore();
}

function draw() {
    time++;
    cx.fillStyle = '#050a12'; cx.fillRect(0,0,W,H);
    
    if (gameState === 'flying') {
        shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.48; // 增加重力感
        shark.angle = Math.atan2(shark.vy, shark.vx);
        shark.tail += 0.4;
        targetCamX = Math.max(camX, shark.x - W * 0.3);

        tanks.forEach((t, i) => {
            if(shark.vy > 0 && shark.x > t.x && shark.x < t.x+t.w && shark.y > t.y-10 && shark.y < t.y+30) {
                playSound('hit');
                for(let k=0; k<10; k++) particles.push({x:shark.x, y:t.y, vx:(Math.random()-0.5)*4, vy:-Math.random()*4, o:1});
                shark.y = t.y - 12; shark.vx = 0; shark.vy = 0; shark.angle = 0;
                gameState = 'idle';
                if(i > 0) { 
                    score += i; scEl.textContent = score; 
                    if(score>best){best=score; bsEl.textContent=best; localStorage.setItem('shark_best',best);} 
                    tanks.splice(0,i); while(tanks.length<5) spawnNext(); 
                }
            }
        });
        if(shark.y > H + 50 || shark.x < camX - 100) { gameState = 'dead'; msg.style.display = 'flex'; }
    } else {
        shark.tail += 0.06;
    }
    
    camX += (targetCamX - camX) * 0.08;

    cx.save(); cx.translate(-camX, 0);
    tanks.forEach(t => {
        cx.strokeStyle = t.color; cx.lineWidth = 3; cx.shadowBlur = 15; cx.shadowColor = t.color;
        cx.strokeRect(t.x, t.y, t.w, t.h);
        cx.save(); cx.beginPath(); cx.rect(t.x, t.y, t.w, t.h); cx.clip();
        cx.fillStyle = 'rgba(0,204,255,0.15)';
        cx.beginPath(); cx.moveTo(t.x, t.y + t.h);
        for(let tx=0; tx<=t.w; tx+=5) {
            const ty = Math.sin(tx*0.06 + time*0.05 + t.offset) * 3;
            cx.lineTo(t.x + tx, t.y + 10 + ty);
        }
        cx.lineTo(t.x + t.w, t.y + t.h); cx.fill();
        t.bubbles.forEach(b => {
            b.y -= b.s; if(b.y < 5) b.y = t.h - 5;
            cx.fillStyle = 'rgba(255,255,255,0.2)';
            cx.beginPath(); cx.arc(t.x + b.x, t.y + b.y, b.r, 0, Math.PI*2); cx.fill();
        });
        cx.restore();
    });
    
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.o -= 0.02;
        if(p.o <= 0) particles.splice(i, 1);
        cx.fillStyle = `rgba(255,255,255,${p.o})`;
        cx.beginPath(); cx.arc(p.x, p.y, 2, 0, Math.PI*2); cx.fill();
    });
    
    drawShark(shark.x, shark.y, shark.angle, shark.tail, gameState === 'idle');
    cx.restore();

    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1500, 1);
        cx.fillStyle = '#0088ff'; cx.fillRect(0, H-4, W*p, 4);
    }
    requestAnimationFrame(draw);
}

const start = (e) => { 
    if(e.type === 'touchstart') e.preventDefault();
    if(gameState === 'idle'){ holding = true; holdStart = Date.now(); }
};
const end = () => {
    if(holding) {
        holding = false;
        const duration = Date.now() - holdStart;
        if (duration < 150) return; // 增加死区，防止误触灵敏度过高
        
        playSound('jump');
        const p = Math.min(duration/1500, 1);
        // 重新调校的动力学公式：更平稳的初速度
        shark.vx = W*0.015 + p * (W*0.035); 
        shark.vy = -H*0.012 - p * (H*0.022);
        gameState = 'flying';
    }
};

cv.addEventListener('touchstart', start, {passive:false}); 
window.addEventListener('touchend', end);
cv.addEventListener('mousedown', start); 
window.addEventListener('mouseup', end);

function restartGame() { initGame(); }
best = localStorage.getItem('shark_best') || 0; bsEl.textContent = best;
initGame(); draw();
</script>
</body>
</html>
