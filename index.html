<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海跃动 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #020509; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; }
        #gc { position: relative; width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; background: #050a12; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; pointer-events: none; z-index: 10; }
        .stat { background: rgba(0, 136, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(0, 136, 255, 0.3); border-radius: 20px; padding: 8px 20px; font-size: 13px; color: #4db8ff; letter-spacing: 1px; }
        .stat span { color: #fff; font-weight: bold; margin-left: 5px; font-size: 16px; }
        #msg { position: absolute; inset: 0; background: rgba(3,8,16,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px); }
        #msg h2 { font-size: 32px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 20px #0088ff; }
        #msg p { color: #7aafd4; margin-bottom: 40px; }
        #msg button { background: #0088ff; color: #fff; border: none; border-radius: 30px; padding: 16px 60px; font-size: 18px; font-weight: bold; }
        #hint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(77,184,255,0.4); font-size: 12px; }
    </style>
</head>
<body>
<div id="gc">
    <div id="ui">
        <div class="stat">DEPTH<span id="sc">0</span></div>
        <div class="stat">BEST<span id="bs">0</span></div>
    </div>
    <canvas id="cv"></canvas>
    <div id="msg">
        <h2>SHARK LOST</h2>
        <p id="mb">小鲨鱼迷失在深海了...</p >
        <button onclick="restartGame()">重新出发</button>
    </div>
    <div id="hint">长按蓄力 · 闪电出击</div>
</div>

<script>
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg'), mb = document.getElementById('mb');

let W, H, gameState, score = 0, best = 0, holding = false, holdStart = 0, time = 0;
let tanks = [], shark, stars = [], particles = [], cam = { x: 0, tx: 0 };

// --- 声音合成器逻辑 ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playSound(type) {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    if (type === 'jump') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
}

function resize() {
    W = Math.min(window.innerWidth, 500); H = window.innerHeight;
    cv.width = W * devicePixelRatio; cv.height = H * devicePixelRatio;
    cx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resize); resize();

function makeTank(x) {
    const w = 80 + Math.random()*20, h = 60 + Math.random()*40;
    return { x, y: H - h - 120, w, h, color: '#00ccff' };
}

function initGame() {
    score = 0; scEl.textContent = 0;
    tanks = [makeTank(W/2 - 45)]; 
    for(let i=0; i<3; i++) spawnNext();
    shark = { x: tanks[0].x+45, y: tanks[0].y-20, vx:0, vy:0, angle:0, tail:0 };
    cam.x = shark.x - W/2; cam.tx = cam.x;
    particles = []; gameState = 'idle';
    msg.style.display = 'none';
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    tanks.push(makeTank(last.x + last.w + 120 + Math.random()*80));
}

// --- 绘制鲨鱼造型 ---
function drawShark(x, y, ang, tail) {
    cx.save();
    cx.translate(x, y);
    cx.rotate(ang);
    
    // 鲨鱼身体渐变
    const g = cx.createLinearGradient(-20, 0, 20, 0);
    g.addColorStop(0, '#1a75ff'); g.addColorStop(1, '#80b3ff');
    cx.fillStyle = g;
    cx.shadowBlur = 10; cx.shadowColor = '#4db8ff';

    // 身体 (流线型)
    cx.beginPath();
    cx.ellipse(0, 0, 22, 10, 0, 0, Math.PI*2);
    cx.fill();

    // 背鳍
    cx.beginPath();
    cx.moveTo(-5, -8); cx.quadraticCurveTo(0, -18, 10, -5);
    cx.fill();

    // 尾巴 (摇摆)
    const tw = Math.sin(tail) * 5;
    cx.beginPath();
    cx.moveTo(-18, 0);
    cx.lineTo(-30, -10 + tw);
    cx.lineTo(-26, 0);
    cx.lineTo(-30, 10 + tw);
    cx.fill();

    // 眼睛 (凶萌一点)
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(12, -3, 2.5, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#000'; cx.beginPath(); cx.arc(13, -3, 1.2, 0, Math.PI*2); cx.fill();
    
    cx.restore();
}

function draw() {
    time++;
    cx.fillStyle = '#050a12'; cx.fillRect(0,0,W,H);
    
    cx.save(); cx.translate(-cam.x, 0);

    tanks.forEach(t => {
        cx.strokeStyle = t.color; cx.lineWidth = 3;
        cx.shadowBlur = 15; cx.shadowColor = t.color;
        cx.strokeRect(t.x, t.y, t.w, t.h);
        cx.fillStyle = 'rgba(0,204,255,0.15)'; cx.fillRect(t.x, t.y+5, t.w, t.h-5);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.o -= 0.02;
        if(p.o <= 0) particles.splice(i, 1);
        cx.fillStyle = `rgba(255,255,255,${p.o})`;
        cx.beginPath(); cx.arc(p.x, p.y, 2, 0, Math.PI*2); cx.fill();
    });

    drawShark(shark.x, shark.y, shark.angle, shark.tail);
    cx.restore();

    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1200, 1);
        cx.fillStyle = '#0088ff'; cx.fillRect(0, H-4, W*p, 4);
    }

    if(gameState === 'flying') {
        shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.45;
        shark.angle = Math.atan2(shark.vy, shark.vx);
        shark.tail += 0.4;
        cam.tx = shark.x - W/2 + 50;
        
        tanks.forEach((t, i) => {
            if(shark.vy > 0 && shark.x > t.x+5 && shark.x < t.x+t.w-5 && shark.y > t.y && shark.y < t.y+20) {
                playSound('hit');
                for(let k=0; k<8; k++) particles.push({x:shark.x, y:t.y, vx:rnd(-2,2), vy:rnd(-3,-1), o:1});
                shark.y = t.y - 10; shark.vx = 0; shark.vy = 0;
                gameState = 'idle';
                if(i > 0) { score += i; scEl.textContent = score; if(score>best){best=score; bsEl.textContent=best; localStorage.setItem('shark_best',best);} tanks.splice(0,i); while(tanks.length<4) spawnNext(); }
            }
        });
        if(shark.y > H || shark.x < cam.x-20) { gameState = 'dead'; msg.style.display = 'flex'; }
    } else {
        shark.tail += 0.05;
        cam.x += (cam.tx - cam.x) * 0.1;
    }
    requestAnimationFrame(draw);
}

const handleStart = (e) => { 
    if(e.type==='touchstart') e.preventDefault();
    if(gameState==='idle'){ holding=true; holdStart=Date.now(); if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
};
const handleEnd = () => {
    if(holding) {
        holding = false; playSound('jump');
        const p = Math.min((Date.now()-holdStart)/1200, 1);
        shark.vx = 5 + p * 10; shark.vy = -8 - p * 12;
        gameState = 'flying';
    }
};

cv.addEventListener('touchstart', handleStart); window.addEventListener('touchend', handleEnd);
cv.addEventListener('mousedown', handleStart); window.addEventListener('mouseup', handleEnd);

function restartGame() { initGame(); }
best = localStorage.getItem('shark_best') || 0; bsEl.textContent = best;
initGame(); draw();
</script>
</body>
</html>
