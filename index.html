<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海跃动 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #020509; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; position: fixed; width: 100%; }
        #gc { position: relative; width: 100%; height: 100%; background: #050a12; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; pointer-events: none; z-index: 10; }
        .stat { background: rgba(0, 136, 255, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(0, 136, 255, 0.3); border-radius: 20px; padding: 6px 16px; font-size: 12px; color: #4db8ff; }
        .stat span { color: #fff; font-weight: bold; margin-left: 4px; font-size: 15px; }
        #msg { position: absolute; inset: 0; background: rgba(3,8,16,0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px); }
        #msg h2 { font-size: 28px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 15px #0088ff; }
        #msg p { color: #7aafd4; margin-bottom: 30px; font-size: 14px; }
        #msg button { background: #0088ff; color: #fff; border: none; border-radius: 30px; padding: 14px 50px; font-size: 16px; font-weight: bold; }
        #hint { position: absolute; bottom: 50px; width: 100%; text-align: center; color: rgba(77,184,255,0.4); font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>
<div id="gc">
    <div id="ui">
        <div class="stat">DEPTH<span id="sc">0</span></div>
        <div class="stat">BEST<span id="bs">0</span></div>
    </div>
    <canvas id="cv"></canvas>
    <div id="msg">
        <h2>SHARK LOST</h2>
        <p id="mb">小鲨鱼迷失在深海了...</p >
        <button onclick="restartGame()">重新出发</button>
    </div>
    <div id="hint">长按蓄力 · 闪电出击</div>
</div>

<script>
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg');

let W, H, gameState, score = 0, best = 0, holding = false, holdStart = 0, time = 0;
let tanks = [], shark, particles = [], camX = 0, targetCamX = 0;

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playSound(type) {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'jump') {
        osc.frequency.setValueAtTime(160, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

function makeTank(x) {
    const tankW = W * 0.24; const tankH = H * 0.12;
    return { x, y: H - tankH - 120, w: tankW, h: tankH, color: '#00ccff' };
}

function initGame() {
    score = 0; scEl.textContent = 0;
    // 起点缸位置
    tanks = [makeTank(W * 0.15)]; 
    for(let i=0; i<4; i++) spawnNext();
    shark = { x: tanks[0].x + (W * 0.12), y: tanks[0].y - 20, vx:0, vy:0, angle:0, tail:0 };
    camX = 0; targetCamX = 0;
    particles = []; gameState = 'idle';
    msg.style.display = 'none';
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    const gap = W * 0.4 + Math.random() * (W * 0.2);
    tanks.push(makeTank(last.x + last.w + gap));
}

function drawShark(x, y, ang, tail) {
    cx.save(); cx.translate(x, y); cx.rotate(ang);
    const g = cx.createLinearGradient(-15, 0, 15, 0);
    g.addColorStop(0, '#1a75ff'); g.addColorStop(1, '#80b3ff');
    cx.fillStyle = g; cx.shadowBlur = 10; cx.shadowColor = '#4db8ff';
    cx.beginPath(); cx.ellipse(0, 0, 18, 8, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.moveTo(-4, -6); cx.quadraticCurveTo(0, -14, 8, -4); cx.fill();
    const tw = Math.sin(tail) * 4;
    cx.beginPath(); cx.moveTo(-15, 0); cx.lineTo(-24, -7 + tw); cx.lineTo(-21, 0); cx.lineTo(-24, 7 + tw); cx.fill();
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(10, -2, 2, 0, Math.PI*2); cx.fill();
    cx.restore();
}

function draw() {
    time++;
    cx.fillStyle = '#050a12'; cx.fillRect(0,0,W,H);
    
    // --- 核心更新逻辑 ---
    if (gameState === 'flying') {
        shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.45;
        shark.angle = Math.atan2(shark.vy, shark.vx);
        shark.tail += 0.4;
        
        // 镜头平滑跟随：确保鲨鱼一直在屏幕左侧 30% 到 50% 之间
        targetCamX = Math.max(0, shark.x - W * 0.3);

        tanks.forEach((t, i) => {
            if(shark.vy > 0 && shark.x > t.x && shark.x < t.x+t.w && shark.y > t.y && shark.y < t.y+30) {
                playSound('hit');
                for(let k=0; k<6; k++) particles.push({x:shark.x, y:t.y, vx:(Math.random()-0.5)*4, vy:-Math.random()*4, o:1});
                shark.y = t.y - 12; shark.vx = 0; shark.vy = 0;
                gameState = 'idle';
                if(i > 0) { 
                    score += i; scEl.textContent = score; 
                    if(score>best){best=score; bsEl.textContent=best; localStorage.setItem('shark_best',best);} 
                    tanks.splice(0,i); while(tanks.length<5) spawnNext(); 
                }
            }
        });
        
        if(shark.y > H + 100 || shark.x < camX - 100) { 
            gameState = 'dead'; msg.style.display = 'flex'; 
        }
    } else {
        shark.tail += 0.05;
        // 非飞行状态，镜头也要向目标平滑移动
    }
    
    camX += (targetCamX - camX) * 0.1;

    // --- 绘图层 ---
    cx.save(); 
    cx.translate(-camX, 0);
    
    tanks.forEach(t => {
        cx.strokeStyle = t.color; cx.lineWidth = 2;
        cx.shadowBlur = 12; cx.shadowColor = t.color;
        cx.strokeRect(t.x, t.y, t.w, t.h);
        cx.fillStyle = 'rgba(0,204,255,0.1)'; cx.fillRect(t.x, t.y+5, t.w, t.h-5);
    });
    
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.o -= 0.02;
        if(p.o <= 0) particles.splice(i, 1);
        cx.fillStyle = `rgba(255,255,255,${p.o})`;
        cx.beginPath(); cx.arc(p.x, p.y, 2, 0, Math.PI*2); cx.fill();
    });
    
    drawShark(shark.x, shark.y, shark.angle, shark.tail);
    cx.restore();

    // 蓄力条
    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1200, 1);
        cx.fillStyle = '#0088ff'; cx.fillRect(0, H-4, W*p, 4);
    }
    
    requestAnimationFrame(draw);
}

const start = (e) => { 
    if(e.type === 'touchstart') e.preventDefault();
    if(gameState === 'idle'){ 
        holding = true; holdStart = Date.now(); 
        if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); 
    }
};
const end = () => {
    if(holding) {
        holding = false; playSound('jump');
        const p = Math.min((Date.now()-holdStart)/1200, 1);
        // 稍微加大了基础弹跳力
        shark.vx = W*0.02 + p * (W*0.028); 
        shark.vy = -H*0.013 - p * (H*0.016);
        gameState = 'flying';
    }
};
cv.addEventListener('touchstart', start, {passive:false}); window.addEventListener('touchend', end);
cv.addEventListener('mousedown', start); window.addEventListener('mouseup', end);

best = localStorage.getItem('shark_best') || 0; bsEl.textContent = best;
initGame(); draw();
</script>
</body>
</html>
